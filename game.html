<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Defender</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Courier New', monospace;
  }
  canvas {
    border: 1px solid #222;
    image-rendering: pixelated;
  }
  #ui {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: #fff;
    pointer-events: none;
    z-index: 10;
  }
  #ui.hidden { display: none; }
  #ui h1 { font-size: 48px; color: #0ff; text-shadow: 0 0 20px #0ff; margin-bottom: 16px; }
  #ui p { font-size: 18px; color: #aaa; margin-bottom: 8px; }
  #ui .score-final { font-size: 28px; color: #ff0; margin: 12px 0; }
  #ui .blink { animation: blink 1s infinite; }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui">
  <h1>SPACE DEFENDER</h1>
  <p>Arrow keys or WASD to move</p>
  <p>Space to shoot</p>
  <p class="blink">Press ENTER to start</p>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const ui = document.getElementById('ui');

const W = 600, H = 800;
canvas.width = W;
canvas.height = H;

// Game state
let state = 'menu'; // menu | playing | gameover
let score = 0;
let highScore = 0;
let level = 1;
let spawnTimer = 0;
let spawnRate = 90;
let shakeTimer = 0;

// Stars
const stars = Array.from({ length: 120 }, () => ({
  x: Math.random() * W,
  y: Math.random() * H,
  speed: 0.5 + Math.random() * 2,
  size: Math.random() * 2 + 0.5,
  brightness: Math.random()
}));

// Player
const player = {
  x: W / 2, y: H - 80, w: 32, h: 32,
  speed: 5, lives: 3, invincible: 0,
  cooldown: 0, fireRate: 10
};

// Entity arrays
let bullets = [];
let enemies = [];
let particles = [];
let powerups = [];

// Input
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === 'Enter') {
    if (state === 'menu' || state === 'gameover') startGame();
  }
  if (e.key === ' ') e.preventDefault();
});
window.addEventListener('keyup', e => keys[e.key] = false);

function startGame() {
  state = 'playing';
  score = 0;
  level = 1;
  spawnRate = 90;
  spawnTimer = 0;
  player.x = W / 2;
  player.y = H - 80;
  player.lives = 3;
  player.invincible = 0;
  player.cooldown = 0;
  player.fireRate = 10;
  bullets = [];
  enemies = [];
  particles = [];
  powerups = [];
  ui.classList.add('hidden');
}

function showGameOver() {
  state = 'gameover';
  if (score > highScore) highScore = score;
  ui.classList.remove('hidden');
  ui.innerHTML = `
    <h1>GAME OVER</h1>
    <div class="score-final">Score: ${score}</div>
    <p>High Score: ${highScore}</p>
    <p class="blink">Press ENTER to retry</p>
  `;
}

// Spawn enemies
function spawnEnemy() {
  const type = Math.random();
  if (type < 0.6) {
    // Basic enemy
    enemies.push({
      x: Math.random() * (W - 30) + 15, y: -20,
      w: 24, h: 24, vy: 1.5 + level * 0.3, vx: 0,
      hp: 1, type: 'basic', color: '#f44', points: 10
    });
  } else if (type < 0.85) {
    // Zigzag enemy
    enemies.push({
      x: Math.random() * (W - 30) + 15, y: -20,
      w: 28, h: 28, vy: 1.2 + level * 0.2, vx: 2,
      hp: 2, type: 'zigzag', color: '#f80', points: 25, timer: 0
    });
  } else {
    // Tank enemy
    enemies.push({
      x: Math.random() * (W - 40) + 20, y: -30,
      w: 36, h: 36, vy: 0.8 + level * 0.15, vx: 0,
      hp: 4, type: 'tank', color: '#c0f', points: 50
    });
  }
}

// Spawn particles for explosion
function explode(x, y, color, count = 12) {
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i) / count + Math.random() * 0.5;
    const speed = 1 + Math.random() * 3;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 30 + Math.random() * 20,
      maxLife: 50,
      color,
      size: 2 + Math.random() * 3
    });
  }
  shakeTimer = 6;
}

// Collision detection
function overlap(a, b) {
  return a.x - a.w / 2 < b.x + b.w / 2 &&
         a.x + a.w / 2 > b.x - b.w / 2 &&
         a.y - a.h / 2 < b.y + b.h / 2 &&
         a.y + a.h / 2 > b.y - b.h / 2;
}

// Draw the player ship
function drawPlayer() {
  if (player.invincible > 0 && Math.floor(player.invincible / 3) % 2) return;
  const { x, y } = player;
  ctx.save();
  ctx.translate(x, y);

  // Engine glow
  ctx.fillStyle = '#08f';
  ctx.shadowColor = '#08f';
  ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.moveTo(-8, 16);
  ctx.lineTo(0, 16 + 6 + Math.random() * 8);
  ctx.lineTo(8, 16);
  ctx.fill();

  // Ship body
  ctx.shadowColor = '#0ff';
  ctx.shadowBlur = 8;
  ctx.fillStyle = '#0cf';
  ctx.beginPath();
  ctx.moveTo(0, -18);
  ctx.lineTo(-14, 14);
  ctx.lineTo(-6, 10);
  ctx.lineTo(0, 14);
  ctx.lineTo(6, 10);
  ctx.lineTo(14, 14);
  ctx.closePath();
  ctx.fill();

  // Cockpit
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(0, -2, 3, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

// Draw enemies
function drawEnemy(e) {
  ctx.save();
  ctx.translate(e.x, e.y);
  ctx.shadowColor = e.color;
  ctx.shadowBlur = 8;
  ctx.fillStyle = e.color;

  if (e.type === 'basic') {
    ctx.beginPath();
    ctx.moveTo(0, -12);
    ctx.lineTo(12, 6);
    ctx.lineTo(6, 12);
    ctx.lineTo(-6, 12);
    ctx.lineTo(-12, 6);
    ctx.closePath();
    ctx.fill();
  } else if (e.type === 'zigzag') {
    ctx.beginPath();
    ctx.moveTo(0, -14);
    ctx.lineTo(14, 0);
    ctx.lineTo(0, 14);
    ctx.lineTo(-14, 0);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(0, 0, 4, 0, Math.PI * 2);
    ctx.fill();
  } else {
    // Tank - hexagon
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const a = (Math.PI * 2 * i) / 6 - Math.PI / 2;
      const r = 18;
      ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
    }
    ctx.closePath();
    ctx.fill();
    // HP indicator
    ctx.fillStyle = '#fff';
    ctx.font = '12px Courier New';
    ctx.textAlign = 'center';
    ctx.shadowBlur = 0;
    ctx.fillText(e.hp, 0, 5);
  }
  ctx.restore();
}

// Update
function update() {
  if (state !== 'playing') return;

  // Player movement
  const left = keys['ArrowLeft'] || keys['a'] || keys['A'];
  const right = keys['ArrowRight'] || keys['d'] || keys['D'];
  const up = keys['ArrowUp'] || keys['w'] || keys['W'];
  const down = keys['ArrowDown'] || keys['s'] || keys['S'];
  if (left) player.x -= player.speed;
  if (right) player.x += player.speed;
  if (up) player.y -= player.speed;
  if (down) player.y += player.speed;
  player.x = Math.max(16, Math.min(W - 16, player.x));
  player.y = Math.max(16, Math.min(H - 16, player.y));

  // Shooting
  if (player.cooldown > 0) player.cooldown--;
  if (keys[' '] && player.cooldown <= 0) {
    bullets.push({ x: player.x, y: player.y - 18, w: 4, h: 10, vy: -8 });
    player.cooldown = player.fireRate;
  }

  // Invincibility timer
  if (player.invincible > 0) player.invincible--;

  // Update bullets
  bullets.forEach(b => b.y += b.vy);
  bullets = bullets.filter(b => b.y > -20);

  // Spawn enemies
  spawnTimer++;
  if (spawnTimer >= spawnRate) {
    spawnEnemy();
    spawnTimer = 0;
  }

  // Level up
  const newLevel = Math.floor(score / 200) + 1;
  if (newLevel > level) {
    level = newLevel;
    spawnRate = Math.max(20, 90 - level * 8);
  }

  // Drop powerup occasionally
  if (Math.random() < 0.001) {
    powerups.push({
      x: Math.random() * (W - 40) + 20, y: -10,
      w: 16, h: 16, vy: 1.5, type: Math.random() < 0.5 ? 'life' : 'rapid'
    });
  }

  // Update powerups
  powerups.forEach(p => p.y += p.vy);
  powerups = powerups.filter(p => {
    if (p.y > H + 20) return false;
    if (overlap(player, p)) {
      if (p.type === 'life') {
        player.lives = Math.min(player.lives + 1, 5);
        explode(p.x, p.y, '#0f0', 8);
      } else {
        player.fireRate = Math.max(4, player.fireRate - 2);
        explode(p.x, p.y, '#ff0', 8);
      }
      return false;
    }
    return true;
  });

  // Update enemies
  enemies.forEach(e => {
    e.y += e.vy;
    if (e.type === 'zigzag') {
      e.timer = (e.timer || 0) + 1;
      e.x += Math.sin(e.timer * 0.05) * e.vx;
    }
    e.x = Math.max(e.w / 2, Math.min(W - e.w / 2, e.x));
  });

  // Bullet-enemy collisions
  enemies = enemies.filter(e => {
    if (e.y > H + 40) return false;
    let hit = false;
    bullets = bullets.filter(b => {
      if (overlap(b, e)) {
        e.hp--;
        hit = true;
        // Small spark
        for (let i = 0; i < 4; i++) {
          particles.push({
            x: b.x, y: b.y,
            vx: (Math.random() - 0.5) * 3,
            vy: (Math.random() - 0.5) * 3,
            life: 10, maxLife: 10,
            color: '#ff0', size: 2
          });
        }
        return false;
      }
      return true;
    });
    if (e.hp <= 0) {
      score += e.points;
      explode(e.x, e.y, e.color, 16);
      return false;
    }
    return true;
  });

  // Player-enemy collisions
  enemies = enemies.filter(e => {
    if (player.invincible <= 0 && overlap(player, e)) {
      player.lives--;
      player.invincible = 90;
      explode(player.x, player.y, '#0ff', 20);
      shakeTimer = 12;
      if (player.lives <= 0) showGameOver();
      return false;
    }
    return true;
  });

  // Update particles
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.97;
    p.vy *= 0.97;
    p.life--;
  });
  particles = particles.filter(p => p.life > 0);

  if (shakeTimer > 0) shakeTimer--;
}

// Draw
function draw() {
  ctx.save();

  // Screen shake
  if (shakeTimer > 0) {
    const intensity = shakeTimer * 0.8;
    ctx.translate(
      (Math.random() - 0.5) * intensity,
      (Math.random() - 0.5) * intensity
    );
  }

  // Background
  ctx.fillStyle = '#080810';
  ctx.fillRect(0, 0, W, H);

  // Stars
  stars.forEach(s => {
    s.y += s.speed;
    if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
    const flicker = 0.7 + Math.sin(Date.now() * 0.003 + s.brightness * 100) * 0.3;
    ctx.fillStyle = `rgba(200,220,255,${s.brightness * flicker})`;
    ctx.fillRect(s.x, s.y, s.size, s.size);
  });

  if (state === 'playing' || state === 'gameover') {
    // Bullets
    ctx.shadowColor = '#0f0';
    ctx.shadowBlur = 6;
    ctx.fillStyle = '#0f0';
    bullets.forEach(b => {
      ctx.fillRect(b.x - b.w / 2, b.y - b.h / 2, b.w, b.h);
    });
    ctx.shadowBlur = 0;

    // Enemies
    enemies.forEach(drawEnemy);

    // Powerups
    powerups.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(Date.now() * 0.003);
      ctx.fillStyle = p.type === 'life' ? '#0f0' : '#ff0';
      ctx.shadowColor = ctx.fillStyle;
      ctx.shadowBlur = 10;
      ctx.fillRect(-8, -8, 16, 16);
      ctx.fillStyle = '#000';
      ctx.font = 'bold 12px Courier New';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.shadowBlur = 0;
      ctx.fillText(p.type === 'life' ? '+' : 'F', 0, 1);
      ctx.restore();
    });

    // Particles
    particles.forEach(p => {
      const alpha = p.life / p.maxLife;
      ctx.globalAlpha = alpha;
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
    });
    ctx.globalAlpha = 1;

    // Player
    if (state === 'playing') drawPlayer();

    // HUD
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff';
    ctx.font = '16px Courier New';
    ctx.textAlign = 'left';
    ctx.fillText(`SCORE: ${score}`, 12, 28);
    ctx.textAlign = 'right';
    ctx.fillText(`LEVEL ${level}`, W - 12, 28);

    // Lives
    ctx.textAlign = 'left';
    for (let i = 0; i < player.lives; i++) {
      ctx.fillStyle = '#0cf';
      ctx.beginPath();
      const lx = 14 + i * 22;
      ctx.moveTo(lx, 48);
      ctx.lineTo(lx - 6, 58);
      ctx.lineTo(lx + 6, 58);
      ctx.closePath();
      ctx.fill();
    }
  }

  ctx.restore();
}

// Game loop
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
